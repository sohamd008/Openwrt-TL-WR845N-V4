name: OpenWrt-21.02-Image-Builder

on:
  workflow_dispatch:

env:
  # This is the 21.02.7 'Old Stable' Image Builder
  IMAGE_BUILDER_URL: https://downloads.openwrt.org/releases/21.02.7/targets/ramips/mt76x8/openwrt-imagebuilder-21.02.7-ramips-mt76x8.Linux-x86_64.tar.xz

jobs:
  build:
    runs-on: ubuntu-22.04 # Using 22.04 for better compatibility with 21.02 tools
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev libncursesw5-dev zlib1g-dev gawk git gettext libssl-dev xsltproc wget unzip python3

      - name: Download & Extract Image Builder
        run: |
          wget $IMAGE_BUILDER_URL
          mkdir ib
          tar -xJf *.tar.xz -C ib --strip-components=1

      - name: Customize IP and Settings
        run: |
          cd ib
          mkdir -p files/etc/config
          echo "config interface 'lan'
            option device 'br-lan'
            option proto 'static'
            option ipaddr '192.168.5.1'
            option netmask '255.255.255.0'
            option ip6assign '60'" > files/etc/config/network

      - name: Build Firmware
        run: |
          cd ib
          # Using the absolute minimum packages to fit LuCI on a 4MB chip
          make image PROFILE="tplink_tl-wr841n-v14" \
          PACKAGES="uhttpd uhttpd-mod-ubus libiwinfo-lua luci-base luci-app-firewall luci-mod-admin-full luci-theme-bootstrap \
          -ppp -ppp-mod-pppoe -ip6tables -odhcp6c -kmod-ipv6 -kmod-ip6tables -odhcpd-ipv6only -luci-proto-ppp -luci-proto-ipv6" \
          FILES="files"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WR845N-V4-Old-Stable-Firmware
          path: ib/bin/targets/ramips/mt76x8/*.bin
