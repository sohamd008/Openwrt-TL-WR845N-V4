name: OpenWrt-23.05-8MB-Builder

on:
  workflow_dispatch:

env:
  # This version recognizes your full 8MB Flash
  IMAGE_BUILDER_URL: https://downloads.openwrt.org/releases/23.05.3/targets/ramips/mt76x8/openwrt-imagebuilder-23.05.3-ramips-mt76x8.Linux-x86_64.tar.xz

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev libncursesw5-dev zlib1g-dev gawk git gettext libssl-dev xsltproc wget unzip python3

      - name: Download & Extract Image Builder
        run: |
          wget $IMAGE_BUILDER_URL
          mkdir ib
          tar -xJf *.tar.xz -C ib --strip-components=1

      - name: Customize IP and Settings
        run: |
          cd ib
          mkdir -p files/etc/config
          echo "config interface 'lan'
            option device 'br-lan'
            option proto 'static'
            option ipaddr '192.168.5.1'
            option netmask '255.255.255.0'
            option ip6assign '60'" > files/etc/config/network

      - name: Build Firmware
        run: |
          cd ib
          # Using the SPECIFIC WR845N-V4 profile (8MB support)
          make image PROFILE="tplink_tl-wr845n-v4" \
          PACKAGES="luci-base luci-mod-admin-full luci-theme-bootstrap uhttpd uhttpd-mod-ubus libiwinfo-lua luci-app-firewall \
          -ppp -ppp-mod-pppoe -ip6tables -odhcp6c -kmod-ipv6 -kmod-ip6tables -odhcpd-ipv6only" \
          FILES="files"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WR845N-V4-8MB-Firmware
          path: ib/bin/targets/ramips/mt76x8/*.bin
