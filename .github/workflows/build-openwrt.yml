name: OpenWrt-19.07-Safe-Spoof

on:
  workflow_dispatch:

env:
  # Using the older, ultra-light 19.07.10 Image Builder
  IMAGE_BUILDER_URL: https://downloads.openwrt.org/releases/19.07.10/targets/ramips/mt76x8/openwrt-imagebuilder-19.07.10-ramips-mt76x8.Linux-x86_64.tar.xz

jobs:
  build:
    runs-on: ubuntu-20.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev libncursesw5-dev zlib1g-dev gawk git gettext libssl-dev xsltproc rsync wget unzip python3

      - name: Download & Extract Image Builder
        run: |
          wget $IMAGE_BUILDER_URL
          mkdir ib
          tar -xJf *.tar.xz -C ib --strip-components=1

      - name: The SAFE Spoof
        run: |
          cd ib
          # This swaps the WR841N v14 ID to the WR845N v4 ID.
          # Because the RAM matches perfectly, this will NOT bootloop.
          sed -i 's/0x08410014/0x08450004/g' target/linux/ramips/image/mt76x8.mk

      - name: Build Firmware
        run: |
          cd ib
          # Using the 19.07 profile name and keeping it lean
          make image PROFILE="tl-wr841n-v14" \
          PACKAGES="luci -ppp -ppp-mod-pppoe -ip6tables -odhcp6c -kmod-ipv6 -kmod-ip6tables"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SAFE-WR845N-19.07-FIRMWARE
          path: ib/bin/targets/ramips/mt76x8/*factory.bin
