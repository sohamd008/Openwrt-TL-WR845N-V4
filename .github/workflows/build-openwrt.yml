name: OpenWrt-21.02-Master-Hack

on:
  workflow_dispatch:

env:
  IMAGE_BUILDER_URL: https://downloads.openwrt.org/releases/21.02.7/targets/ramips/mt76x8/openwrt-imagebuilder-21.02.7-ramips-mt76x8.Linux-x86_64.tar.xz

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev libncursesw5-dev zlib1g-dev gawk git gettext libssl-dev xsltproc rsync wget unzip python3

      - name: Download & Extract Image Builder
        run: |
          wget $IMAGE_BUILDER_URL
          mkdir ib
          tar -xJf *.tar.xz -C ib --strip-components=1

      - name: The Master Hacks
        run: |
          cd ib
          # 1. Expand the image size limit from 4MB to 8MB (7936k)
          sed -i '/define Device\/tplink_tl-wr841n-v14/,/endef/ s/IMAGE_SIZE := .*/IMAGE_SIZE := 7936k/' target/linux/ramips/image/mt76x8.mk
          
          # 2. Change the flash layout from 4M to 8M
          sed -i '/define Device\/tplink_tl-wr841n-v14/,/endef/ s/4Mmtk/8Mmtk/' target/linux/ramips/image/mt76x8.mk
          
          # 3. Spoof the Hardware ID to WR845N v4
          sed -i '/define Device\/tplink_tl-wr841n-v14/,/endef/ s/0x08410014/0x08450004/' target/linux/ramips/image/mt76x8.mk

      - name: Build Firmware
        run: |
          cd ib
          make image PROFILE="tplink_tl-wr841n-v14" \
          PACKAGES="luci -ppp -ppp-mod-pppoe -ip6tables -odhcp6c -kmod-ipv6 -kmod-ip6tables"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WR845N-V4-ULTIMATE-FIRMWARE
          path: ib/bin/targets/ramips/mt76x8/*.bin
