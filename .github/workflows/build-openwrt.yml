name: OpenWrt-21.02-Master-Hack

on:
  workflow_dispatch:

env:
  # Using 21.02.7 where we KNOW the profile exists and the official kernel is small
  IMAGE_BUILDER_URL: https://downloads.openwrt.org/releases/21.02.7/targets/ramips/mt76x8/openwrt-imagebuilder-21.02.7-ramips-mt76x8.Linux-x86_64.tar.xz

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev libncursesw5-dev zlib1g-dev gawk git gettext libssl-dev xsltproc rsync wget unzip python3

      - name: Download & Extract Image Builder
        run: |
          wget $IMAGE_BUILDER_URL
          mkdir ib
          tar -xJf *.tar.xz -C ib --strip-components=1

      - name: The Master Hacks
        run: |
          cd ib
          # 1. Unlock the 4MB profile restriction to 8MB so LuCI fits without the "images are too big" error.
          sed -i 's/tplink-4mlzma/tplink-8mlzma/g' target/linux/ramips/image/mt76x8.mk
          
          # 2. Spoof the Hardware ID so the WR845N bootloader accepts it via TFTP.
          sed -i 's/0x08410014/0x08450004/g' target/linux/ramips/image/mt76x8.mk

      - name: Build Firmware
        run: |
          cd ib
          make image PROFILE="tplink_tl-wr841n-v14" \
          PACKAGES="luci -ppp -ppp-mod-pppoe -ip6tables -odhcp6c -kmod-ipv6 -kmod-ip6tables"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WR845N-V4-ULTIMATE-FIRMWARE
          path: ib/bin/targets/ramips/mt76x8/*.bin
